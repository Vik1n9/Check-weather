name: Prefetch dashboard data

on:
  schedule:
    # Every 2 hours (cron cannot express 120-minute intervals directly). Times are UTC.
    - cron: "0 */2 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "docs/data/**"
      - "README.md"

permissions:
  contents: write

concurrency:
  group: prefetch
  cancel-in-progress: false

jobs:
  prefetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Prefetch data
        run: node scripts/prefetch.mjs
        env:
          TZ: Asia/Taipei

      - name: Commit refreshed artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/summary.json docs/data/radar.png
          if git diff --staged --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "data: refresh prefetch [skip ci]"
            git push
          fi
