<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>農工中心氣象與水位</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <h1>農工中心氣象與水位</h1>
          <p>中央氣象署農業氣象站 M024 與桃園市水情資訊網</p>
        </div>
        <button id="refreshButton" type="button">重新整理</button>
      </header>

      <section class="status" id="status">載入中...</section>

      <section class="summary-grid">
        <article class="metric-card weather-card">
          <span class="label">農工中心目前氣象</span>
          <div class="metric-line">
            <strong id="currentTemp">--</strong>
            <span id="currentWeather">--</span>
          </div>
          <div class="highlow">
            <div><dt>今日最低</dt><dd id="todayLow">--</dd></div>
            <div><dt>今日最高</dt><dd id="todayHigh">--</dd></div>
          </div>
          <dl>
            <div><dt>體感</dt><dd id="currentAt">--</dd></div>
            <div><dt>濕度</dt><dd id="currentRh">--</dd></div>
            <div><dt>時雨量</dt><dd id="currentRain">--</dd></div>
          </dl>
        </article>

        <article class="metric-card water-card">
          <span class="label">新街橋即時水位</span>
          <div class="metric-line">
            <strong id="waterLevel">--</strong>
            <span id="waterStation">--</span>
          </div>
          <p id="waterNote" class="note"></p>
          <dl>
            <div><dt>溪流</dt><dd id="waterStream">--</dd></div>
            <div><dt>資料更新</dt><dd id="waterTime">--</dd></div>
          </dl>
        </article>
      </section>

      <section class="radar-section water-embed">
        <div class="section-head">
          <h2>新街橋水位剖面圖</h2>
          <span id="waterShotTime">--</span>
        </div>
        <div class="embed-cta">
          <p class="embed-note">
            桃園市水情資訊網禁止其他網站內嵌其畫面（伺服器設定 X-Frame-Options），
            剖面圖無法直接顯示在此頁。點下方按鈕即可在新分頁開啟官方新街橋即時剖面圖。
          </p>
          <a id="waterLiveLink" class="cta-button"
             href="https://winfo.tycg.gov.tw/tysafep/Default.aspx"
             target="_blank" rel="noopener noreferrer">開啟新街橋即時剖面圖 ↗</a>
          <p class="embed-meta">目前水位 <strong id="waterEmbedLevel">--</strong>（資料來源：桃園市水情資訊網）</p>
        </div>
      </section>

      <section class="radar-section">
        <div class="section-head">
          <h2>雷達回波</h2>
          <span id="radarTime">--</span>
        </div>
        <figure class="radar-frame">
          <img id="radarImage" alt="臺灣鄰近區域雷達回波靜止圖">
          <figcaption id="radarCaption">臺灣鄰近區域，靜止圖</figcaption>
        </figure>
      </section>
    </main>
    <script src="./app.js" defer></script>
  </body>
</html>
